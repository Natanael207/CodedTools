<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/coi-serviceworker/0.1.7/coi-serviceworker.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-containerr">
        <h2>Audio Converter</h2>
        
        <input type="file" id="audio-upload" accept="audio/*">
        
        <label for="format-select">Zielformat:</label>
        <select id="format-select">
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
            <option value="aac">AAC</option>
            <option value="ogg">OGG</option>
        </select>

        <button id="convert-btn">Konvertieren</button>
        
        <div id="status">Status: Bereit</div>
        <div id="download-area"></div>
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.4/dist/ffmpeg.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
