<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrammeditor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.0/mermaid.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        #diagram-container { margin-top: 20px; }
        .blocks-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .block-row { display: flex; gap: 20px; }
        .block-container { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #000; border-radius: 5px; }
        .block { padding: 5px; border: 1px solid #000; border-radius: 5px; }
        .buttons-container { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 5px; }
        .control-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 10px; padding: 10px; border: 1px solid #000; border-radius: 5px; }
        
        /* Neue Buttons und Positionierung */
        #reset-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #ff6347;
            border: none;
            border-radius: 50%;
            padding: 10px;
            cursor: pointer;
        }

        #reset-button::before {
            content: "🗑️";
            font-size: 18px;
        }

        .info-button {
            position: absolute;
            top: 10px;
            left: 50px;
            background-color: #f9d342;
            border: none;
            border-radius: 50%;
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
            z-index: 10; /* Z-Index hinzugefügt */
        }

        .info-button::before {
            content: "💡";
        }

        .info-button:hover::after {
            content: attr(data-info);
            position: absolute;
            top: 8px;
            left: 40px;
            background-color: #fff;
            padding: 5px;
            border: 1px solid #000;
            border-radius: 3px;
            font-size: 14px;
            white-space: nowrap;
            display: block;
            width: max-content;
            z-index: 20; /* Z-Index hinzugefügt */
        }

        /* Code-Toggle Button */
        #code-toggle-button {
            position: absolute;
            top: 10px;
            left: 90px;
            background-color: #3498db;
            border: none;
            border-radius: 50%;
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        #code-toggle-button::before {
            content: "👁️";
        }

        #code-container {
            display: none;
            margin-top: 20px;
            padding: 10px;
            background-color: #f4f4f4;
            border: 1px solid #ddd;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: monospace;
            font-size: 14px;
        }

    </style>
</head>
<body>
    <h2>Interaktiver Diagrammeditor</h2>
    <div id="blocks-container" class="blocks-wrapper"></div>
    <div id="diagram-container"></div>

    <!-- Reset-Button -->
    <button id="reset-button" onclick="resetDiagram()"></button>

    <!-- Info-Schaltfläche für Undo und Redo -->
    <button class="info-button" data-info="Undo (Ctrl + Z) / Redo (Ctrl + Y)" onclick="toggleHistory()"></button>

    <!-- Code-Toggle Button -->
    <button id="code-toggle-button" onclick="toggleCode()"></button>

    <!-- Code Container -->
    <div id="code-container"></div>

    <script>
        mermaid.initialize({ startOnLoad: true });

        let blocks = JSON.parse(localStorage.getItem("blocks")) || [{ id: 1, name: "Start" }];
        let connections = JSON.parse(localStorage.getItem("connections")) || [];
        let lastId = blocks.length;
        let history = [];
        let redoHistory = [];

        function saveToLocalStorage() {
            localStorage.setItem("blocks", JSON.stringify(blocks));
            localStorage.setItem("connections", JSON.stringify(connections));
        }

        function storeHistory() {
            history.push({ blocks: JSON.parse(JSON.stringify(blocks)), connections: JSON.parse(JSON.stringify(connections)) });
            redoHistory = [];
        }

        function addBlock(parentId) {
            lastId++;
            const newName = prompt("Name des neuen Blocks:", "Neuer Block") || `Block ${lastId}`;
            blocks.push({ id: lastId, name: newName });
            connections.push({ from: parentId, to: lastId });
            saveToLocalStorage();
            storeHistory();
            render();
        }

        function deleteBlock(id) {
            if (id === 1) {
                alert("Der Startblock kann nicht gelöscht werden!");
                return;
            }
            function deleteRecursive(blockId) {
                const childConnections = connections.filter(conn => conn.from === blockId);
                childConnections.forEach(conn => deleteRecursive(conn.to));
                blocks = blocks.filter(b => b.id !== blockId);
                connections = connections.filter(conn => conn.from !== blockId && conn.to !== blockId);
            }
            deleteRecursive(id);
            saveToLocalStorage();
            storeHistory();
            render();
        }

        function updateBlockName(id) {
            const block = blocks.find(b => b.id === id);
            if (block) {
                block.name = prompt("Neuer Name:", block.name) || block.name;
                saveToLocalStorage();
                storeHistory();
                render();
            }
        }

        function resetDiagram() {
            localStorage.removeItem("blocks");
            localStorage.removeItem("connections");
            blocks = [{ id: 1, name: "Start" }];
            connections = [];
            lastId = 1;
            storeHistory();
            render();
        }

        function undo() {
            if (history.length > 1) {
                redoHistory.push({ blocks: JSON.parse(JSON.stringify(blocks)), connections: JSON.parse(JSON.stringify(connections)) });
                history.pop();
                const lastState = history[history.length - 1];
                blocks = JSON.parse(JSON.stringify(lastState.blocks));
                connections = JSON.parse(JSON.stringify(lastState.connections));
                saveToLocalStorage();
                render();
            }
        }

        function redo() {
            if (redoHistory.length > 0) {
                const lastState = redoHistory.pop();
                blocks = JSON.parse(JSON.stringify(lastState.blocks));
                connections = JSON.parse(JSON.stringify(lastState.connections));
                history.push({ blocks: JSON.parse(JSON.stringify(blocks)), connections: JSON.parse(JSON.stringify(connections)) });
                saveToLocalStorage();
                render();
            }
        }

        function toggleHistory() {
            undo();
            redo();
        }

        function getBlockHierarchy() {
            let levels = {};
            function traverse(id, depth) {
                if (!levels[depth]) levels[depth] = [];
                levels[depth].push(id);
                connections.filter(conn => conn.from === id).forEach(conn => traverse(conn.to, depth + 1));
            }
            traverse(1, 0);
            return levels;
        }

        function render() {
            const container = document.getElementById("blocks-container");
            container.innerHTML = "";
            const hierarchy = getBlockHierarchy();
            Object.keys(hierarchy).sort().forEach(level => {
                const row = document.createElement("div");
                row.className = "block-row";
                hierarchy[level].forEach(blockId => {
                    const block = blocks.find(b => b.id === blockId);
                    const div = document.createElement("div");
                    div.className = "block-container";
                    div.innerHTML = `
                        <span onclick="updateBlockName(${block.id})">${block.name}</span>
                        <div class="buttons-container">
                            <button onclick="addBlock(${block.id})">+</button>
                            <button onclick="deleteBlock(${block.id})">-</button>
                        </div>
                    `;
                    row.appendChild(div);
                });
                container.appendChild(row);
            });
            let mermaidText = "graph TD;\n";
            blocks.forEach(block => {
                mermaidText += `  ${block.id}["${block.name}"]\n`;
            });
            connections.forEach(conn => {
                mermaidText += `  ${conn.from} --> ${conn.to}\n`;
            });
            document.getElementById("diagram-container").innerHTML = `<div class="mermaid">${mermaidText}</div>`;
            mermaid.init();
            
            // Update code display
            document.getElementById("code-container").textContent = mermaidText;
        }

        function toggleCode() {
            const codeContainer = document.getElementById("code-container");
            codeContainer.style.display = codeContainer.style.display === "none" ? "block" : "none";
        }

        // Event Listener für Tastenkombinationen
        document.addEventListener("keydown", function(event) {
            if (event.ctrlKey || event.metaKey) { 
                if (event.key === 'z' || event.key === 'Z') {
                    undo();
                } else if (event.key === 'y' || event.key === 'Y') {
                    redo();
                }
            }
        });

        render();
    </script>
</body>
</html>
