<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrammeditor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.0/mermaid.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        #diagram-container { margin-top: 20px; }
        .block { display: flex; align-items: center; gap: 10px; margin: 10px auto; }
        button { cursor: pointer; padding: 5px; }
        .buttons-container { display: flex; justify-content: flex-start; gap: 10px; }
    </style>
</head>
<body>
    <h2>Interaktiver Diagrammeditor</h2>
    <div id="blocks-container"></div>
    <button onclick="resetDiagram()">Diagramm zurücksetzen</button>
    <button onclick="undo()">Undo (Ctrl + Z)</button>
    <button onclick="redo()">Redo (Ctrl + Y)</button>
    <div id="diagram-container"></div>

    <script>
        // Mermaid initialisieren
        mermaid.initialize({ startOnLoad: true });

        // Daten aus localStorage laden oder Standardwerte setzen
        let blocks = JSON.parse(localStorage.getItem("blocks")) || [{ id: 1, name: "Start" }];
        let connections = JSON.parse(localStorage.getItem("connections")) || [];
        let lastId = blocks.length;

        // Verlaufe für Undo/Redo
        let history = [];
        let redoHistory = [];

        function saveToLocalStorage() {
            localStorage.setItem("blocks", JSON.stringify(blocks));
            localStorage.setItem("connections", JSON.stringify(connections));
        }

        function addBlock(parentId) {
            lastId++;
            const newName = prompt("Name des neuen Blocks:", "Neuer Block") || `Block ${lastId}`;
            blocks.push({ id: lastId, name: newName });
            connections.push({ from: parentId, to: lastId });
            saveToLocalStorage();
            storeHistory();
            render();
        }

        function deleteBlock(id) {
            if (id === 1) {
                alert("Der Startblock kann nicht gelöscht werden!");
                return;
            }

            function deleteRecursive(blockId) {
                const childConnections = connections.filter(conn => conn.from === blockId);
                childConnections.forEach(conn => deleteRecursive(conn.to));

                blocks = blocks.filter(b => b.id !== blockId);
                connections = connections.filter(conn => conn.from !== blockId && conn.to !== blockId);
            }

            deleteRecursive(id);

            saveToLocalStorage();
            storeHistory();
            render();
        }

        function updateBlockName(id) {
            const block = blocks.find(b => b.id === id);
            if (block) {
                block.name = prompt("Neuer Name:", block.name) || block.name;
                saveToLocalStorage();
                storeHistory();
                render();
            }
        }

        function resetDiagram() {
            localStorage.removeItem("blocks");
            localStorage.removeItem("connections");
            blocks = [{ id: 1, name: "Start" }];
            connections = [];
            lastId = 1;
            storeHistory();
            render();
        }

        // Funktion, um den aktuellen Zustand zu speichern
        function storeHistory() {
            history.push({ blocks: JSON.parse(JSON.stringify(blocks)), connections: JSON.parse(JSON.stringify(connections)) });
            redoHistory = []; // Redo-Verlauf wird geleert, wenn eine neue Aktion durchgeführt wird
        }

        function undo() {
            if (history.length > 1) {
                redoHistory.push({ blocks: JSON.parse(JSON.stringify(blocks)), connections: JSON.parse(JSON.stringify(connections)) });
                history.pop();
                const lastState = history[history.length - 1];
                blocks = JSON.parse(JSON.stringify(lastState.blocks));
                connections = JSON.parse(JSON.stringify(lastState.connections));
                saveToLocalStorage();
                render();
            } else {
                alert("Keine weiteren Undo-Aktionen verfügbar.");
            }
        }

        function redo() {
            if (redoHistory.length > 0) {
                const lastState = redoHistory.pop();
                blocks = JSON.parse(JSON.stringify(lastState.blocks));
                connections = JSON.parse(JSON.stringify(lastState.connections));
                history.push({ blocks: JSON.parse(JSON.stringify(blocks)), connections: JSON.parse(JSON.stringify(connections)) });
                saveToLocalStorage();
                render();
            } else {
                alert("Keine weiteren Redo-Aktionen verfügbar.");
            }
        }

        function render() {
            const container = document.getElementById("blocks-container");
            container.innerHTML = "";
            blocks.forEach(block => {
                const div = document.createElement("div");
                div.className = "block";
                div.innerHTML = `
                    <div class="buttons-container">
                        <button onclick="addBlock(${block.id})">+</button>
                        <button onclick="deleteBlock(${block.id})">-</button>
                    </div>
                    <span onclick="updateBlockName(${block.id})">${block.name}</span>
                `;
                container.appendChild(div);
            });

            let mermaidText = "graph TD;\n";
            blocks.forEach(block => {
                mermaidText += `  ${block.id}["${block.name}"];\n`;
            });
            connections.forEach(conn => {
                mermaidText += `  ${conn.from} --> ${conn.to};\n`;
            });

            document.getElementById("diagram-container").innerHTML = `<div class="mermaid">${mermaidText}</div>`;
            mermaid.init();
        }

        render();

        // Event Listener für Tastenkürzel (Ctrl + Z und Ctrl + Y)
        document.addEventListener("keydown", function (e) {
            if (e.ctrlKey && e.key === "z") {
                undo();
            } else if (e.ctrlKey && e.key === "y") {
                redo();
            }
        });
    </script>
</body>
</html>
