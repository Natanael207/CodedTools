<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerShare</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --panel: #ffffff;
            --panel-2: #f8fbff;
            --border: #dce5f0;
            --text: #1f2937;
            --muted: #64748b;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
        }
        body { font-family: Arial, sans-serif; max-width: 760px; margin: 0 auto; padding: 24px; line-height: 1.6; background: var(--bg); color: var(--text); min-height: 100vh; box-sizing: border-box; }
        .box { border: 1px solid var(--border); padding: 20px; border-radius: 14px; margin-bottom: 20px; background: var(--panel); box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05); }
        button { background: var(--accent); color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; margin: 2px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border: 1px solid var(--border); border-radius: 8px; background: var(--panel-2); }
        #status { font-size: 0.9rem; color: var(--muted); }
        .hidden { display: none; }
        
        #qrContainer { margin: 20px 0; padding: 15px; background: var(--panel-2); border: 1px dashed var(--border); border-radius: 10px; text-align: center; }
        #qrcode { display: inline-block; margin: 10px 0; }

        #chatWindow { height: min(60vh, 560px); min-height: 320px; border: 1px solid var(--border); background: var(--panel-2); overflow-y: auto; padding: 12px; margin-bottom: 10px; border-radius: 10px; }
        .message { margin-bottom: 8px; padding: 8px 12px; border-radius: 14px; max-width: 82%; word-break: break-all; }
        .msg-me { background: var(--accent); color: white; margin-left: auto; text-align: right; }
        .msg-partner { background: #e2e8f0; color: var(--text); margin-right: auto; }
        .chat-input-area { display: flex; gap: 8px; margin-top: 6px; }
        .chat-input-area input { flex: 1; margin: 0; }
        .file-message { display: flex; flex-direction: column; gap: 4px; }
        .file-message a { color: inherit; text-decoration: underline; font-weight: bold; }
        .file-status { font-size: 0.8rem; opacity: 0.8; }
        #chatWindow.drag-over { outline: 2px dashed var(--accent); background: #eef6ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <h2 style="margin-bottom: 12px;">P2P Chat & Dateien</h2>

    <div id="setupArea" class="box">
        <h3>Raum-Optionen</h3>
        <button id="createRoomBtn">1. Raum erstellen (Host)</button>
        
        <div id="qrContainer" class="hidden">
            <p><strong>Scannen zum Beitreten:</strong></p>
            <div id="qrcode"></div>
            <p><small>Oder gib diese ID ein: <span id="generatedRoomId"></span></small></p>
        </div>

        <p>Oder einem bestehenden Raum beitreten:</p>
        <input type="text" id="roomIdInput" placeholder="Raum-ID hier einfügen">
        <button id="joinRoomBtn">2. Raum beitreten (Gast)</button>
    </div>

    <div id="transferArea" class="box hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px;">
            <div id="status" style="font-size: 0.95rem; color: var(--muted);">Status: Bereit.</div>
            <div style="font-size: 0.9rem; color: green;"><strong>Raum-ID:</strong> <span id="currentRoomId">-</span></div>
        </div>
        <div id="chatWindow"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Nachricht eingeben..." disabled>
            <button id="pickFileBtn" type="button" title="Datei auswählen" style="font-size: 22px">+</button>
            <button id="pickFolderBtn" type="button" title="Ordner auswählen" style="font-size: 20px">📁</button>
            <button id="sendMsgBtn" disabled title="Nachricht senden">Senden ➤</button>
        </div>
        <input type="file" id="fileInput" class="hidden" multiple>
        <input type="file" id="folderInput" class="hidden" webkitdirectory directory multiple>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc, deleteDoc, collection, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKNORGzW6wQymKjVemEraI70rgpcFIxwU",
            authDomain: "webrtc-file-transfer-ab804.firebaseapp.com",
            projectId: "webrtc-file-transfer-ab804",
            storageBucket: "webrtc-file-transfer-ab804.firebasestorage.app",
            messagingSenderId: "780345941054",
            appId: "1:780345941054:web:e9eb34fa3ce44fe6e4c56f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        let peerConnection;
        let dataChannel;
        let currentRoomRef;
        let signalUnsubscribe = null;
        let pendingSignals = [];
        let isNegotiating = false;

        const statusDiv = document.getElementById('status');
        const setupArea = document.getElementById('setupArea');
        const transferArea = document.getElementById('transferArea');
        const currentRoomIdSpan = document.getElementById('currentRoomId');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const roomIdInput = document.getElementById('roomIdInput');

        const chatWindow = document.getElementById('chatWindow');
        const chatInput = document.getElementById('chatInput');
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const pickFileBtn = document.getElementById('pickFileBtn');
        const pickFolderBtn = document.getElementById('pickFolderBtn');
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        const qrContainer = document.getElementById('qrContainer');
        const qrcodeDiv = document.getElementById('qrcode');
        const generatedRoomIdSpan = document.getElementById('generatedRoomId');
        
        const CHUNK_SIZE = 16384;
        let incomingFileMeta = null;
        let receivedChunks = [];
        let receivedSize = 0;
        let currentIncomingMessageId = null;
        const fileMessageElements = new Map();

        const transferQueue = []; 
        let isSendingFile = false;
        const BUFFERED_AMOUNT_LOW = 262144; 

        function waitForBufferedAmountBelow(threshold = BUFFERED_AMOUNT_LOW) {
            return new Promise((resolve) => {
                if (!dataChannel) return resolve();
                if (dataChannel.bufferedAmount <= threshold) return resolve();
                const onLow = () => {
                    dataChannel.onbufferedamountlow = null;
                    resolve();
                };
                try { dataChannel.bufferedAmountLowThreshold = threshold; } catch (e) {}
                dataChannel.onbufferedamountlow = onLow;
                const interval = setInterval(() => {
                    if (!dataChannel || dataChannel.bufferedAmount <= threshold) {
                        clearInterval(interval);
                        dataChannel.onbufferedamountlow = null;
                        resolve();
                    }
                }, 50);
            });
        }

        function enableTransferUI(roomId) {
            setupArea.classList.add('hidden');
            transferArea.classList.remove('hidden');
            currentRoomIdSpan.innerText = roomId;
        }

        function appendMessage(text, side) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', side === 'me' ? 'msg-me' : 'msg-partner');
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function buildFileMessage(name, side, options = {}) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', side === 'me' ? 'msg-me' : 'msg-partner', 'file-message');
            const nameSpan = document.createElement('div');
            nameSpan.innerText = name;
            msgDiv.appendChild(nameSpan);
            const statusText = options.state ? `${options.state}${options.progress !== undefined ? ` · ${options.progress}%` : ''}` : '';
            if (options.url) {
                const link = document.createElement('a');
                link.href = options.url;
                link.download = name;
                link.innerText = 'Download';
                msgDiv.appendChild(link);
            }
            if (statusText) {
                const stateSpan = document.createElement('small');
                stateSpan.className = 'file-status';
                stateSpan.innerText = statusText;
                msgDiv.appendChild(stateSpan);
            }
            return msgDiv;
        }

        function appendFileMessage(name, side, options = {}) {
            const msgDiv = buildFileMessage(name, side, options);
            if (options.id) {
                fileMessageElements.set(options.id, { element: msgDiv, side });
            }
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msgDiv;
        }

        function updateFileMessage(id, side, name, options = {}) {
            const entry = fileMessageElements.get(id);
            if (!entry) {
                return appendFileMessage(name, side, { ...options, id });
            }
            const msgDiv = entry.element;
            msgDiv.className = `message ${side === 'me' ? 'msg-me' : 'msg-partner'} file-message`;
            msgDiv.innerHTML = '';
            const nameSpan = document.createElement('div');
            nameSpan.innerText = name;
            msgDiv.appendChild(nameSpan);
            const statusText = options.state ? `${options.state}${options.progress !== undefined ? ` · ${options.progress}%` : ''}` : '';
            if (options.url) {
                const link = document.createElement('a');
                link.href = options.url;
                link.download = name;
                link.innerText = 'Download';
                msgDiv.appendChild(link);
            }
            if (statusText) {
                const stateSpan = document.createElement('small');
                stateSpan.className = 'file-status';
                stateSpan.innerText = statusText;
                msgDiv.appendChild(stateSpan);
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msgDiv;
        }

        function stopSignalSubscription() {
            if (signalUnsubscribe) {
                signalUnsubscribe();
                signalUnsubscribe = null;
            }
        }

        function createPeerConnection() {
            stopSignalSubscription();
            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.onconnectionstatechange = () => {
                if (['connected', 'completed'].includes(peerConnection.connectionState)) {
                    stopSignalSubscription();
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                if (['connected', 'completed'].includes(peerConnection.iceConnectionState)) {
                    stopSignalSubscription();
                }
            };
        }

        function sendSignal(message) {
            const payload = JSON.stringify(message);
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(payload);
                return true;
            }
            pendingSignals.push(payload);
            return false;
        }

        function flushPendingSignals() {
            if (!dataChannel || dataChannel.readyState !== 'open') return;
            while (pendingSignals.length > 0) {
                dataChannel.send(pendingSignals.shift());
            }
        }

        async function handleSignalMessage(message) {
            if (!peerConnection) return;

            if (message.action === 'offer') {
                if (isNegotiating) return;
                isNegotiating = true;
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: message.type, sdp: message.sdp }));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    sendSignal({ type: 'signal', action: 'answer', type: answer.type, sdp: answer.sdp });
                } catch (e) {
                    console.warn('Offer konnte nicht verarbeitet werden:', e);
                } finally {
                    isNegotiating = false;
                }
            } else if (message.action === 'answer') {
                if (isNegotiating) return;
                isNegotiating = true;
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: message.type, sdp: message.sdp }));
                } catch (e) {
                    console.warn('Answer konnte nicht verarbeitet werden:', e);
                } finally {
                    isNegotiating = false;
                }
            } else if (message.action === 'candidate') {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(message.candidate));
                } catch (e) {
                    console.warn('ICE-Kandidat über Datenkanal konnte nicht hinzugefügt werden:', e);
                }
            }
        }

        function setupDataChannelListeners() {
            dataChannel.onopen = () => {
                statusDiv.innerText = "Status: Verbunden! Alles läuft jetzt direkt P2P.";
                chatInput.disabled = false;
                sendMsgBtn.disabled = false;
                flushPendingSignals();
                processQueue();
            };

            dataChannel.onclose = () => {
                statusDiv.innerText = "Status: Verbindung verloren.";
                chatInput.disabled = true;
                sendMsgBtn.disabled = true;
            };

            dataChannel.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const message = JSON.parse(event.data);
                    if (message.type === 'signal') {
                        handleSignalMessage(message);
                    } else if (message.type === 'meta') {
                        incomingFileMeta = message;
                        receivedChunks = [];
                        receivedSize = 0;
                        currentIncomingMessageId = message.id;
                        appendFileMessage(incomingFileMeta.name, 'partner', { id: currentIncomingMessageId, state: 'wird empfangen…', progress: 0 });
                        statusDiv.innerText = `Status: Empfange Datei "${incomingFileMeta.name}"...`;
                    } else if (message.type === 'chat') {
                        appendMessage(message.text, 'partner');
                    }
                } else {
                    receivedChunks.push(event.data);
                    receivedSize += event.data.byteLength;
                    const percent = Math.round((receivedSize / incomingFileMeta.size) * 100);
                    statusDiv.innerText = `Status: Empfange... (${percent}%)`;
                    updateFileMessage(currentIncomingMessageId, 'partner', incomingFileMeta.name, { state: 'wird empfangen…', progress: percent });

                    if (receivedSize >= incomingFileMeta.size) {
                        const blob = new Blob(receivedChunks);
                        const url = URL.createObjectURL(blob);
                        
                        statusDiv.innerText = `Status: "${incomingFileMeta.name}" empfangen!`;
                        updateFileMessage(currentIncomingMessageId, 'partner', incomingFileMeta.name, { url, state: 'empfangen ✓' });
                        
                        incomingFileMeta = null;
                        receivedChunks = [];
                        receivedSize = 0;
                        currentIncomingMessageId = null;
                    }
                }
            };
        }

        function sendChatMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            dataChannel.send(JSON.stringify({ type: 'chat', text: text }));
            appendMessage(text, 'me');
            chatInput.value = "";
        }
        sendMsgBtn.onclick = sendChatMessage;
        chatInput.onkeydown = (e) => { if (e.key === 'Enter') sendChatMessage(); };

        // Aktualisierte Funktion, die eine optionale vordefinierte ID akzeptiert
        async function enqueueFile(file, existingId = null) {
            const transferId = existingId || `out-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
            
            // Falls die Sprechblase schon existiert (durchs Zippen), aktualisieren wir sie nur, anstatt eine neue anzuhängen
            updateFileMessage(transferId, 'me', file.name, { state: 'in Warteschlange' });
            
            transferQueue.push({ id: transferId, file });
            processQueue();
        }

        async function processQueue() {
            if (isSendingFile) return;
            if (transferQueue.length === 0) return;
            if (!dataChannel || dataChannel.readyState !== 'open') return; 

            const item = transferQueue.shift();
            isSendingFile = true;
            const { id: transferId, file } = item;

            updateFileMessage(transferId, 'me', file.name, { state: 'wird vorbereitet…', progress: 0 });
            statusDiv.innerText = `Status: Sende Datei "${file.name}"...`;

            const arrayBuffer = await file.arrayBuffer();

            dataChannel.send(JSON.stringify({ type: 'meta', id: transferId, name: file.name, size: file.size }));

            let offset = 0;
            while (offset < file.size) {
                const end = Math.min(offset + CHUNK_SIZE, file.size);
                const chunk = arrayBuffer.slice(offset, end);
                if (dataChannel.bufferedAmount > BUFFERED_AMOUNT_LOW) {
                    await waitForBufferedAmountBelow();
                }
                dataChannel.send(chunk);
                offset = end;
                const percent = Math.round((offset / file.size) * 100);
                statusDiv.innerText = `Status: Sende... (${percent}%)`;
                updateFileMessage(transferId, 'me', file.name, { state: 'wird gesendet…', progress: percent });
            }

            statusDiv.innerText = `Status: "${file.name}" gesendet!`;
            updateFileMessage(transferId, 'me', file.name, { state: 'gesendet ✓' });

            isSendingFile = false;
            processQueue();
        }

        pickFileBtn.onclick = () => {
            fileInput.click();
        };

        fileInput.onchange = () => {
            const files = Array.from(fileInput.files || []);
            if (!files.length) return;
            files.forEach(file => enqueueFile(file));
            fileInput.value = '';
        };

        pickFolderBtn.onclick = () => {
            folderInput.click();
        };

        folderInput.onchange = async () => {
            const files = Array.from(folderInput.files || []);
            if (!files.length) return;

            const folderName = files[0].webkitRelativePath.split('/')[0] || 'ordner';
            const zipFileName = `${folderName}.zip`;
            
            // Generiere hier sofort die ID und erstelle die Sprechblase
            const transferId = `out-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
            updateFileMessage(transferId, 'me', zipFileName, { state: 'wird gezippt…' });
            statusDiv.innerText = `Status: Zippe Ordner "${folderName}"...`;

            // Nutze setTimeout, damit der UI-Thread die Sprechblase rendern kann, bevor das rechenintensive Zippen startet
            setTimeout(async () => {
                try {
                    const zip = new JSZip();
                    files.forEach(file => {
                        zip.file(file.webkitRelativePath, file);
                    });

                    const contentBlob = await zip.generateAsync({ type: "blob" });
                    const zippedFile = new File([contentBlob], zipFileName, { type: "application/zip" });
                    
                    // Übergebene ID sorgt dafür, dass die Sprechblase recycelt wird
                    enqueueFile(zippedFile, transferId);
                } catch (error) {
                    alert("Fehler beim Zippen des Ordners: " + error.message);
                    updateFileMessage(transferId, 'me', zipFileName, { state: 'Fehler beim Zippen ❌' });
                } finally {
                    folderInput.value = '';
                }
            }, 50);
        };

        chatWindow.addEventListener('dragover', (e) => {
            e.preventDefault();
            chatWindow.classList.add('drag-over');
        });

        chatWindow.addEventListener('dragleave', () => {
            chatWindow.classList.remove('drag-over');
        });

        chatWindow.addEventListener('drop', (e) => {
            e.preventDefault();
            chatWindow.classList.remove('drag-over');
            
            const items = Array.from(e.dataTransfer?.items || []);
            let containsFolder = false;

            for (let item of items) {
                if (item.kind === 'file') {
                    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
                    if (entry && entry.isDirectory) {
                        containsFolder = true;
                        break;
                    }
                }
            }

            if (!containsFolder) {
                const files = Array.from(e.dataTransfer?.files || []);
                for (let file of files) {
                    if (!file.type && (file.size % 4096 === 0 || !file.name.includes('.'))) {
                        containsFolder = true;
                        break;
                    }
                }
            }

            if (containsFolder) {
                alert("Das Hinzufügen von Ordnern per Drag & Drop wird nicht unterstützt. Bitte benutze das Ordner-Symbol (📁), um Ordner hochzuladen!");
                return;
            }

            const files = Array.from(e.dataTransfer?.files || []);
            if (files.length) {
                files.forEach(file => enqueueFile(file));
            }
        });

        createRoomBtn.onclick = async () => {
            statusDiv.innerText = "Status: Initialisiere...";
            
            try {
                const querySnapshot = await getDocs(collection(db, "rooms"));
                const jetzt = Date.now();
                querySnapshot.forEach(async (roomDoc) => {
                    const data = roomDoc.data();
                    if (data.createdAt && (jetzt - data.createdAt > 10000)) {
                        await deleteDoc(doc(db, "rooms", roomDoc.id));
                    }
                });
            } catch (e) {}

            const roomId = Math.random().toString(36).substring(2, 9);
            currentRoomRef = doc(db, "rooms", roomId);

            createPeerConnection(); 
            dataChannel = peerConnection.createDataChannel("persistentFileChannel");
            setupDataChannelListeners();

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    if (dataChannel && dataChannel.readyState === 'open') {
                        dataChannel.send(JSON.stringify({ type: 'signal', action: 'candidate', candidate: event.candidate.toJSON() }));
                    } else if (currentRoomRef) {
                        updateDoc(currentRoomRef, { senderCandidates: arrayUnion(event.candidate.toJSON()) });
                    }
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await setDoc(currentRoomRef, { offer: { type: offer.type, sdp: offer.sdp }, createdAt: Date.now() });

            statusDiv.innerText = `Status: Raum erstellt! Warte auf Partner...`;
            qrcodeDiv.innerHTML = ""; 
            const joinUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            new QRCode(qrcodeDiv, { text: joinUrl, width: 180, height: 180 });
            generatedRoomIdSpan.innerText = roomId;
            qrContainer.classList.remove('hidden'); 

            signalUnsubscribe = onSnapshot(currentRoomRef, async (snapshot) => {
                const data = snapshot.data();
                if (!data) return;

                if (data.answer && !peerConnection.currentRemoteDescription) {
                    qrContainer.classList.add('hidden');
                    enableTransferUI(roomId);
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }

                if (data.receiverCandidates && Array.isArray(data.receiverCandidates)) {
                    for (const candidateData of data.receiverCandidates) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(candidateData));
                        } catch (e) {
                            console.warn('ICE-Kandidat konnte nicht hinzugefügt werden:', e);
                        }
                    }
                }
            });
        };

        joinRoomBtn.onclick = async () => {
            const roomId = roomIdInput.value.trim();
            if (!roomId) return alert("Raum-ID eingeben!");

            statusDiv.innerText = "Status: Verbinde mit Raum...";
            currentRoomRef = doc(db, "rooms", roomId);
            const roomSnapshot = await getDoc(currentRoomRef);

            if (!roomSnapshot.exists()) return alert("Raum nicht gefunden!");

            const roomData = roomSnapshot.data();
            
            createPeerConnection(); 

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    if (dataChannel && dataChannel.readyState === 'open') {
                        dataChannel.send(JSON.stringify({ type: 'signal', action: 'candidate', candidate: event.candidate.toJSON() }));
                    } else if (currentRoomRef) {
                        updateDoc(currentRoomRef, { receiverCandidates: arrayUnion(event.candidate.toJSON()) });
                    }
                }
            };

            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannelListeners();
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(roomData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await updateDoc(currentRoomRef, { answer: { type: answer.type, sdp: answer.sdp } });

            enableTransferUI(roomId);

            signalUnsubscribe = onSnapshot(currentRoomRef, async (snapshot) => {
                const data = snapshot.data();
                if (!data) return;

                if (data.senderCandidates && Array.isArray(data.senderCandidates)) {
                    for (const candidateData of data.senderCandidates) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(candidateData));
                        } catch (e) {
                            console.warn('ICE-Kandidat konnte nicht hinzugefügt werden:', e);
                        }
                    }
                }
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomFromUrl = urlParams.get('room');
            if (roomFromUrl) {
                roomIdInput.value = roomFromUrl;
                statusDiv.innerText = "Status: Raum-ID erkannt. Klicke auf 'Raum beitreten'!";
            }
        });
    </script>
</body>
</html>
